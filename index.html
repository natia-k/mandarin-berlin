<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANDARIN | BERLIN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --orange: #f58220;
            --text-dim: rgba(255,255,255,0.4);
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── THE "ATMOSPHERE" ── */
        .ambient-glow {
            position: fixed;
            top: 20%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(245, 130, 32, 0.04) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* ── NAVIGATION (Floating & Thin) ── */
        nav {
            position: fixed;
            width: 100%;
            padding: 40px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo { 
            font-weight: 900; 
            letter-spacing: 10px; 
            font-size: 0.9rem; 
        }

        /* ── HERO (The Editorial Look) ── */
        header {
            height: 100vh;
            padding: 0 10%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .hero-title {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 100;
            line-height: 0.85;
            letter-spacing: -4px;
            margin-left: -5px; /* Pulls text to edge for brutalist feel */
        }

        .hero-title span {
            display: block;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
        }

        .hero-sub {
            margin-top: 40px;
            max-width: 350px;
            font-weight: 200;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 2;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ── ASYMMETRIC CONTENT ── */
        .section-label {
            padding: 100px 10% 40px;
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--orange);
        }

        .services-list {
            padding: 0 10% 150px;
            display: flex;
            flex-direction: column;
            gap: 0; /* No gaps, just lines */
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 60px 0;
            border-bottom: 1px solid var(--border);
            transition: 0.5s ease;
            position: relative;
        }

        .service-item:hover {
            padding-left: 30px;
            border-bottom: 1px solid var(--orange);
        }

        .service-item h3 {
            font-size: 2.5rem;
            font-weight: 100;
        }

        .service-item .desc {
            max-width: 300px;
            font-weight: 200;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-align: right;
        }

        /* ── THE ORANGE BUTTON ── */
        .cta {
            position: relative;
            display: inline-block;
            margin-top: 50px;
            padding: 20px 40px;
            border: 1px solid var(--border);
            text-decoration: none;
            color: #fff;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            overflow: hidden;
            transition: 0.4s;
        }

        .cta:hover {
            border-color: var(--orange);
            box-shadow: 0 0 30px rgba(245, 130, 32, 0.2);
        }

        /* ── FOOTER ── */
        footer {
            padding: 100px 10% 60px;
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .service-item { flex-direction: column; align-items: flex-start; gap: 20px; }
            .service-item .desc { text-align: left; }
            .hero-title { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MANDARIN</div>
        <div style="font-size: 0.6rem; letter-spacing: 3px; opacity: 0.4;">BERLIN · 2024</div>
    </nav>

    <header>
        <h1 class="hero-title">
            FACILITY<br>
            <span>SERVICES</span>
        </h1>
        <p class="hero-sub">Exzellenz in der Verwaltung, Instandhaltung und Sicherheit Ihrer Immobilien.</p>
        <a href="mailto:info@mandarin-berlin.de" class="cta">Anfrage Senden</a>
    </header>

    <div class="section-label">Dienstleistungen</div>

    <section class="services-list">

            <p class="desc">Ganzheitliche administrative Steuerung und Werterhalt Ihrer Objekte.</p>
